name: Deploy Flutter web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web app
        run: |
          flutter build web \
            --release \
            --base-href /viknjanadeepam/ \
            --pwa-strategy=none \
            --dart-define="BUILD_VERSION=${GITHUB_SHA}"

      - name: Version web assets
        shell: bash
        run: |
          sed -i "s/__BUILD_VERSION__/${GITHUB_SHA}/g" \
            build/web/index.html \
            build/web/manifest.json \
            build/web/update-worker.js
          sed -i "s|main.dart.js|main.dart.js?v=${GITHUB_SHA}|g" \
            build/web/flutter_bootstrap.js

      - name: Add admin route entry point
        shell: bash
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          mkdir -p build/web/admin
          cp web/admin/index.html build/web/admin/index.html
          cat > build/web/admin/config.js <<EOF
          window.ADMIN_CONFIG = {
            adminPassword: "${ADMIN_PASSWORD:-VijnanaDeepam@2026}"
          };
          EOF

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
