<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="The Vijnana Deepam annual magazine digital archive and reader.">
  <meta name="theme-color" content="#08121D">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="vijnanadeepam">
  <link rel="apple-touch-icon" href="icons/vijnanadeepam-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="vijnanadeepam-favicon.png"/>

  <title>Vijnana Deepam</title>
  <link rel="manifest" href="manifest.json?v=__BUILD_VERSION__">
</head>
<body>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (!sessionStorage.getItem('update-reloaded')) {
          sessionStorage.setItem('update-reloaded', 'true');
          window.location.reload();
        }
      });
      window.addEventListener('load', function () {
        navigator.serviceWorker.register(
          'update-worker.js?v=__BUILD_VERSION__'
        ).then(function (registration) {
          registration.update();
        });
      });
    }
  </script>
  <script src="flutter_bootstrap.js?v=__BUILD_VERSION__"></script>
</body>
</html>
